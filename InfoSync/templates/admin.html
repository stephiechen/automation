<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>資訊維護後台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 12px; }
    .result-badge { font-size: .85rem; }
    #result-area { min-height: 40px; }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:720px">
  <h4 class="mb-4 fw-bold">資訊維護後台</h4>

  <ul class="nav nav-tabs mb-4" id="mainTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-doctor">醫師資訊</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-hours">營業時間</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-post">公告 / 貼文</button></li>
  </ul>

  <div class="tab-content">

    <!-- 醫師資訊 -->
    <div class="tab-pane fade show active" id="tab-doctor">
      <div class="card p-4">
        <form id="form-doctor">
          <div class="mb-3">
            <label class="form-label">姓名</label>
            <input name="name" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">院所</label>
            <select name="clinic" class="form-select" required>
              <option value="">-- 請選擇院所 --</option>
              <option value="clinic_a">院所 A</option>
              <option value="clinic_b">院所 B</option>
              <option value="clinic_c">院所 C</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">類別</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="member_type" value="doctor" id="type-doctor" checked />
                <label class="form-check-label" for="type-doctor">醫師</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="member_type" value="assistant" id="type-assistant" />
                <label class="form-check-label" for="type-assistant">助理</label>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">科別 / 職稱</label>
            <input name="specialty" class="form-control" />
          <div class="mb-3">
            <label class="form-label">學經歷 / 簡介</label>
            <textarea name="bio" class="form-control" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">醫師照片</label>
            <input name="photo" type="file" class="form-control" accept="image/*" />
          </div>
          <div class="mb-3">
            <label class="form-label d-block">同步平台</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="shopline" id="doc-sl" checked />
              <label class="form-check-label" for="doc-sl">官網（醫師陣容頁）</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">同步</button>
        </form>
        <div id="result-doctor" class="mt-3"></div>
      </div>
    </div>

    <!-- 營業時間 -->
    <div class="tab-pane fade" id="tab-hours">
      <div class="card p-4">
        <form id="form-hours">
          <table class="table table-sm align-middle">
            <thead><tr><th>星期</th><th>開診</th><th>關診</th><th>休診</th></tr></thead>
            <tbody>
              {% set days = [("monday","週一"),("tuesday","週二"),("wednesday","週三"),("thursday","週四"),("friday","週五"),("saturday","週六"),("sunday","週日")] %}
              {% for key, label in days %}
              <tr>
                <td>{{ label }}</td>
                <td><input type="time" name="{{ key }}_open" class="form-control form-control-sm" value="09:00" /></td>
                <td><input type="time" name="{{ key }}_close" class="form-control form-control-sm" value="17:00" /></td>
                <td><input type="checkbox" name="{{ key }}_closed" class="form-check-input" /></td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
          <hr class="my-3" />
          <p class="fw-semibold mb-2 text-secondary" style="font-size:.9rem">Google 最新動態設定</p>
          <div class="mb-3">
            <label class="form-label">營業時間圖片 <span class="text-muted" style="font-size:.8rem">（上傳後將發布到 Google 最新動態）</span></label>
            <input name="hours_image" type="file" class="form-control" accept="image/*" />
          </div>
          <div class="mb-3">
            <label class="form-label">貼文說明文字 <span class="text-muted" style="font-size:.8rem">（留空則使用預設文字）</span></label>
            <textarea name="post_caption" class="form-control" rows="2" placeholder="例：本院門診時間異動，最新時間如圖，造成不便敬請見諒。"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label d-block">同步平台</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="shopline" id="hr-sl" checked />
              <label class="form-check-label" for="hr-sl">官網（診所資訊頁）</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="google" id="hr-g" checked />
              <label class="form-check-label" for="hr-g">Google 商家（更新時間＋刪舊貼文＋發新動態）</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="facebook" id="hr-fb" checked />
              <label class="form-check-label" for="hr-fb">Facebook（發新貼文）</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">同步</button>
        </form>
        <div id="result-hours" class="mt-3"></div>
      </div>
    </div>

    <!-- 公告貼文 -->
    <div class="tab-pane fade" id="tab-post">
      <div class="card p-4">
        <form id="form-post">
          <div class="mb-3">
            <label class="form-label">內容</label>
            <textarea name="message" class="form-control" rows="4" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">圖片（Instagram 必填）</label>
            <input name="image" type="file" class="form-control" accept="image/*" />
          </div>
          <div class="mb-3">
            <label class="form-label d-block">同步平台</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="google" id="p-g" checked />
              <label class="form-check-label" for="p-g">Google 商家</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="facebook" id="p-fb" checked />
              <label class="form-check-label" for="p-fb">Facebook</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" name="platforms" value="instagram" id="p-ig" checked />
              <label class="form-check-label" for="p-ig">Instagram</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">同步</button>
        </form>
        <div id="result-post" class="mt-3"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const PLATFORM_LABELS = {
  shopline: "官網", google: "Google 商家", facebook: "Facebook", instagram: "Instagram"
};

function renderResults(container, data) {
  let html = "";
  for (const [platform, res] of Object.entries(data)) {
    const label = PLATFORM_LABELS[platform] || platform;
    if (res.ok) {
      let detail = "";
      if (platform === "google" && res.deleted_old !== undefined) {
        detail = res.deleted_old ? "（舊貼文已刪除）" : "（無舊貼文）";
      }
      html += `<span class="badge bg-success me-2 result-badge">✓ ${label} ${detail}</span>`;
    } else {
      html += `<span class="badge bg-danger me-2 result-badge" title="${res.error}">✗ ${label}: ${res.error}</span>`;
    }
  }
  container.innerHTML = html || '<span class="text-muted small">無選擇平台</span>';
}

async function submitForm(formId, endpoint, resultId) {
  const form = document.getElementById(formId);
  const resultDiv = document.getElementById(resultId);
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    resultDiv.innerHTML = '<span class="text-muted small">同步中…</span>';
    try {
      const resp = await fetch(endpoint, { method: "POST", body: new FormData(form) });
      const data = await resp.json();
      renderResults(resultDiv, data);
    } catch (err) {
      resultDiv.innerHTML = `<span class="text-danger small">錯誤：${err.message}</span>`;
    }
  });
}

submitForm("form-doctor", "/sync/doctor", "result-doctor");
submitForm("form-hours",  "/sync/hours",  "result-hours");
submitForm("form-post",   "/sync/post",   "result-post");
</script>
</body>
</html>
